tools:
  - name: file_read
    description: "시장 조사 및 아이디어 문서 읽기"
    parameters:
      path:
        type: string
        required: true
        description: "읽을 파일 경로 (output/idea-brief.md, output/mvp-scope.md 등)"

  - name: file_write
    description: "마케팅 전략 산출물 저장"
    parameters:
      path:
        type: string
        required: true
        description: "저장할 파일 경로 (output/marketing/strategy.md, competitor-analysis.md, gtm-plan.md)"
      content:
        type: string
        required: true
        description: "저장할 마케팅 전략 내용"
