tools:
  - name: file_read
    description: Read stage inputs, contracts, and existing artifacts.
    parameters:
      path:
        type: string
        required: true
        description: Path to the file to read.
  - name: file_write
    description: Write or update the stage artifacts owned by this agent.
    parameters:
      path:
        type: string
        required: true
        description: Path to the file to write.
      content:
        type: string
        required: true
        description: Content to write.
  - name: library_docs
    description: Look up official library documentation when implementation details are unclear.
    parameters:
      libraryName:
        type: string
        required: true
        description: Library or framework name.
      query:
        type: string
        required: true
        description: Question to ask about the library.
