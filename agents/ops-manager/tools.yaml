tools:
  - name: file_read
    description: "릴리즈 체크리스트 및 백엔드 계획 읽기"
    parameters:
      path:
        type: string
        required: true
        description: "읽을 파일 경로"

  - name: file_write
    description: "운영 산출물 저장"
    parameters:
      path:
        type: string
        required: true
        description: "저장할 파일 경로 (output/ops/runbook.md, alerts.yml, release-run.md)"
      content:
        type: string
        required: true
        description: "저장할 내용 (비밀값 실제 값 포함 금지 — 키 이름만 명시)"
