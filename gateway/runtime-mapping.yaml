# solo-product-squad Gateway — 런타임 매핑 테이블
# 추상 선언(tier, tools, forbidden_actions) → 구체 구현 변환

# ─────────────────────────────────────────────
# 티어 → LLM 모델 매핑
# ─────────────────────────────────────────────
tier_mapping:
  default:
    HEAVY:
      model: "claude-opus-4-6"
    HIGH:
      model: "claude-opus-4-6"
    MEDIUM:
      model: "claude-sonnet-4-6"
    LOW:
      model: "claude-haiku-4-5"
  # ops-manager: LOW~MEDIUM → 기본 MEDIUM 적용 (default로 충분)

# ─────────────────────────────────────────────
# 추상 도구명 → 실제 도구 매핑
# builtin 도구(Read, Write, Bash 등)는 런타임 내장 처리이므로 생략
# ─────────────────────────────────────────────
tool_mapping:
  # context7 MCP (frontend-engineer · backend-engineer 전용)
  library_docs:
    - type: mcp
      server: "context7"
      tools: ["resolve-library-id", "get-library-docs"]

# ─────────────────────────────────────────────
# 액션 카테고리 → 실제 도구 매핑
# forbidden_actions 블랙리스트에서 참조
# ─────────────────────────────────────────────
action_mapping:
  file_read: ["Read", "Glob", "Grep"]
  file_write: ["Write", "Edit"]
  file_delete: ["Bash"]
  code_execute: ["Bash"]
  network_access: ["WebFetch", "WebSearch"]
  user_interact: ["AskUserQuestion"]
  agent_delegate: ["Task"]
